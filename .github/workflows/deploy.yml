# ── Deploy: Public Website ────────────────────────────────────
#
# Publishes the static site to the weblisk-public R2 bucket
# and deploys the Worker that serves weblisk.dev.
#
# Publishes to:
#   weblisk-public R2 bucket (static files)
#   weblisk-public Worker (serves weblisk.dev)

name: Deploy

on:
  push:
    branches: [main]

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          BUCKET="s3://weblisk-public"

          upload() {
            aws s3 cp "$1" "${BUCKET}/$2" \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type "$3" \
              --no-progress
          }

          # Build list of site files to upload (allowlist approach)
          SITE_FILES=$(mktemp)
          find . -type f \( \
            -name '*.html' -o \
            -name '*.css' -o \
            -name '*.svg' -o \
            -name '*.png' -o \
            -name '*.jpg' -o \
            -name '*.jpeg' -o \
            -name '*.webp' -o \
            -name '*.ico' -o \
            -name '*.woff2' -o \
            -name '*.woff' -o \
            -name '*.xml' -o \
            -name 'manifest.webmanifest' -o \
            -name 'robots.txt' -o \
            -name 'llms.txt' \
          \) \
            -not -path './.git/*' \
            -not -path './.github/*' \
            -not -path './.vscode/*' \
            -not -path './workers/*' \
          > "$SITE_FILES"

          # Also include JS files under js/ only (not workers/, not root)
          find ./js -type f -name '*.js' >> "$SITE_FILES" 2>/dev/null || true

          # Include sw.js at root
          [ -f ./sw.js ] && echo "./sw.js" >> "$SITE_FILES"

          cat "$SITE_FILES" | while read -r file; do
            # Strip leading ./
            key="${file#./}"

            # Determine MIME type
            case "$file" in
              *.html)  mime="text/html" ;;
              *.css)   mime="text/css" ;;
              *.js)    mime="application/javascript" ;;
              *.json)  mime="application/json" ;;
              *.webmanifest) mime="application/manifest+json" ;;
              *.svg)   mime="image/svg+xml" ;;
              *.png)   mime="image/png" ;;
              *.jpg|*.jpeg) mime="image/jpeg" ;;
              *.ico)   mime="image/x-icon" ;;
              *.webp)  mime="image/webp" ;;
              *.woff2) mime="font/woff2" ;;
              *.woff)  mime="font/woff" ;;
              *.txt)   mime="text/plain" ;;
              *.xml)   mime="application/xml" ;;
              *)       mime="application/octet-stream" ;;
            esac

            upload "$file" "$key" "$mime"
          done

          rm -f "$SITE_FILES"
          echo "✓ Site files uploaded to R2"

      - name: Clean stale files from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          BUCKET="s3://weblisk-public"

          # Build set of local keys (same allowlist as upload step)
          LOCAL_KEYS=$(mktemp)
          find . -type f \( \
            -name '*.html' -o \
            -name '*.css' -o \
            -name '*.svg' -o \
            -name '*.png' -o \
            -name '*.jpg' -o \
            -name '*.jpeg' -o \
            -name '*.webp' -o \
            -name '*.ico' -o \
            -name '*.woff2' -o \
            -name '*.woff' -o \
            -name '*.xml' -o \
            -name 'manifest.webmanifest' -o \
            -name 'robots.txt' -o \
            -name 'llms.txt' \
          \) \
            -not -path './.git/*' \
            -not -path './.github/*' \
            -not -path './.vscode/*' \
            -not -path './workers/*' \
          | sed 's|^\./||' > "$LOCAL_KEYS"
          find ./js -type f -name '*.js' 2>/dev/null | sed 's|^\./||' >> "$LOCAL_KEYS" || true
          [ -f ./sw.js ] && echo "sw.js" >> "$LOCAL_KEYS"
          sort -o "$LOCAL_KEYS" "$LOCAL_KEYS"

          # List all keys currently in R2
          REMOTE_KEYS=$(mktemp)
          aws s3 ls "${BUCKET}/" --recursive --endpoint-url "$R2_ENDPOINT" \
            | awk '{print $4}' | sort > "$REMOTE_KEYS"

          # Delete keys in R2 that don't exist locally
          STALE=$(comm -23 "$REMOTE_KEYS" "$LOCAL_KEYS")
          if [ -n "$STALE" ]; then
            echo "Removing stale files from R2:"
            echo "$STALE" | while read -r key; do
              echo "  - $key"
              aws s3 rm "${BUCKET}/${key}" --endpoint-url "$R2_ENDPOINT"
            done
          else
            echo "✓ R2 is clean — no stale files"
          fi

          rm -f "$LOCAL_KEYS" "$REMOTE_KEYS"

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: "4.81.1"
