# ── Deploy: Public Website ────────────────────────────────────
#
# Publishes the blueprint-driven site to Cloudflare:
#   R2:     Static files + blueprints
#   Worker: Gateway serving weblisk.dev
#   KV:     Edge cache (invalidated on deploy)
#
# Environments:
#   main push      → production (weblisk-public bucket, weblisk.dev routes)
#   pull_request   → preview   (weblisk-public-preview bucket, *.workers.dev)
#
# Structure:
#   public/     → R2 root (static files served by Worker)
#   blueprints/ → R2 blueprints/ prefix (served by Blueprint API)
#   workers/    → Cloudflare Worker (gateway + agents)

name: Deploy

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "target=preview" >> "$GITHUB_OUTPUT"
            echo "bucket=weblisk-public-preview" >> "$GITHUB_OUTPUT"
            echo "wrangler_env=--env preview" >> "$GITHUB_OUTPUT"
          else
            echo "target=production" >> "$GITHUB_OUTPUT"
            echo "bucket=weblisk-public" >> "$GITHUB_OUTPUT"
            echo "wrangler_env=" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          BUCKET="s3://${{ steps.env.outputs.bucket }}"

          upload() {
            aws s3 cp "$1" "${BUCKET}/$2" \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type "$3" \
              --no-progress
          }

          # ── Upload public/ directory (static site files) ──
          echo "[${{ steps.env.outputs.target }}] Uploading public/ files..."
          find ./public -type f \( \
            -name '*.html' -o \
            -name '*.css' -o \
            -name '*.js' -o \
            -name '*.svg' -o \
            -name '*.png' -o \
            -name '*.jpg' -o \
            -name '*.jpeg' -o \
            -name '*.webp' -o \
            -name '*.ico' -o \
            -name '*.woff2' -o \
            -name '*.woff' -o \
            -name '*.xml' -o \
            -name 'manifest.webmanifest' -o \
            -name 'robots.txt' -o \
            -name 'llms.txt' \
          \) | while read -r file; do
            key="${file#./public/}"

            case "$file" in
              *.html)  mime="text/html" ;;
              *.css)   mime="text/css" ;;
              *.js)    mime="application/javascript" ;;
              *.json)  mime="application/json" ;;
              *.webmanifest) mime="application/manifest+json" ;;
              *.svg)   mime="image/svg+xml" ;;
              *.png)   mime="image/png" ;;
              *.jpg|*.jpeg) mime="image/jpeg" ;;
              *.ico)   mime="image/x-icon" ;;
              *.webp)  mime="image/webp" ;;
              *.woff2) mime="font/woff2" ;;
              *.woff)  mime="font/woff" ;;
              *.txt)   mime="text/plain" ;;
              *.xml)   mime="application/xml" ;;
              *)       mime="application/octet-stream" ;;
            esac

            upload "$file" "$key" "$mime"
          done
          echo "✓ Public files uploaded"

          # ── Upload blueprints/ (for Blueprint API) ──
          echo "Uploading blueprints/..."
          find ./blueprints -type f -name '*.yaml' -o -name '*.yml' | while read -r file; do
            key="${file#./}"
            upload "$file" "$key" "text/yaml"
          done
          echo "✓ Blueprints uploaded"

      - name: Clean stale files from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          BUCKET="s3://${{ steps.env.outputs.bucket }}"

          LOCAL_KEYS=$(mktemp)

          find ./public -type f \( \
            -name '*.html' -o \
            -name '*.css' -o \
            -name '*.js' -o \
            -name '*.svg' -o \
            -name '*.png' -o \
            -name '*.jpg' -o \
            -name '*.jpeg' -o \
            -name '*.webp' -o \
            -name '*.ico' -o \
            -name '*.woff2' -o \
            -name '*.woff' -o \
            -name '*.xml' -o \
            -name 'manifest.webmanifest' -o \
            -name 'robots.txt' -o \
            -name 'llms.txt' \
          \) | sed 's|^\./public/||' >> "$LOCAL_KEYS"

          find ./blueprints -type f \( -name '*.yaml' -o -name '*.yml' \) \
            | sed 's|^\./||' >> "$LOCAL_KEYS"

          sort -o "$LOCAL_KEYS" "$LOCAL_KEYS"

          REMOTE_KEYS=$(mktemp)
          aws s3 ls "${BUCKET}/" --recursive --endpoint-url "$R2_ENDPOINT" \
            | awk '{print $4}' | sort > "$REMOTE_KEYS"

          STALE=$(comm -23 "$REMOTE_KEYS" "$LOCAL_KEYS")
          if [ -n "$STALE" ]; then
            echo "Removing stale files from R2:"
            echo "$STALE" | while read -r key; do
              echo "  - $key"
              aws s3 rm "${BUCKET}/${key}" --endpoint-url "$R2_ENDPOINT"
            done
          else
            echo "✓ R2 is clean — no stale files"
          fi

          rm -f "$LOCAL_KEYS" "$REMOTE_KEYS"

      - name: Invalidate KV cache
        if: steps.env.outputs.target == 'production'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: kv bulk delete --namespace-id=${{ secrets.KV_NAMESPACE_ID }} --force <(echo '[]') || true

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy ${{ steps.env.outputs.wrangler_env }}
