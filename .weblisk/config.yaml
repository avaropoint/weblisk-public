# Weblisk Hub Configuration — weblisk.dev
# See: https://github.com/avaropoint/weblisk-blueprints/blob/main/schemas/config.md
#
# Runtime topology for the weblisk.dev hub on Cloudflare Workers.
# Blueprints (global, code, theme, pages, components) live in blueprints/.
# This file is operational config only — ports, bindings, storage, env.

extends: platforms/cloudflare

hub:
  name: weblisk-public
  version: 2.0.0
  entry: workers/site.js
  compatibility_date: "2026-04-01"

orchestrator:
  storage: durable-objects
  binding: ORCHESTRATOR
  class: Orchestrator
  migration_tag: v1
  audit: true

gateway:
  tls: false                    # Cloudflare edge handles TLS
  static_dir: public
  auth: none
  rate_limit: 100/min
  cors:
    origins: [ "https://weblisk.dev", "http://localhost:*" ]
    methods: [ GET, POST ]
    headers: [ Content-Type, X-Request-Id ]
  islands:
    routing: domain
  blueprint_api:
    enabled: true
    prefix: /api/blueprint
    sources: [ blueprints/ ]

domains:
  - name: website

agents:
  - name: examples
    type: work
    domain: website
    route: /api/examples
    module: workers/domains/website.js
    requires_ai: true

# Cloudflare Bindings

bindings:
  r2:
    - name: SITE
      production: weblisk-public
      preview: weblisk-public-preview
  kv:
    - name: CACHE
      id: 7606e97b0b2b46369fc120a9667b7ecc
      preview_id: e0440485b33e41be9e062c12b6ab1639
  durable_objects:
    - name: ORCHESTRATOR
      class: Orchestrator
  secrets:
    - WL_AI_KEY
  vars:
    WL_VERSION: "1.0.0"
    WL_AI_MODEL: claude-sonnet-4-20250514
    WL_AI_BASE_URL: "https://gateway.ai.cloudflare.com/v1/2cabe7bc419e2b0fa22cc2b37ff60425/weblisk-ai/anthropic"

# Environments

environments:
  production:
    routes:
      - pattern: "weblisk.dev/*"
        zone_name: weblisk.dev
      - pattern: "weblisk.dev"
        zone_name: weblisk.dev
    vars:
      WL_ENVIRONMENT: production
  preview:
    name: weblisk-public-preview
    vars:
      WL_ENVIRONMENT: preview
