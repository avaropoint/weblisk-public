# Navigation Component
# Renders the top navbar with site links, social, and theme toggle.
# Extends: standards/components (props, accessibility contract)

name: nav
type: component
extends: standards/components
hydrate: load
status: active
version: 2.0.0

props:
  active_path: { type: string, required: true }  # Current page path — used to set aria-current

structure:
  element: nav
  class: navbar
  aria_label: Main navigation
  children:
    - element: div
      class: navbar-inner
      children:
        - type: brand-link
          logo: /images/mark/logo.svg
          text: Weblisk
          version: v1.0
        - type: nav-links
          source: global.yaml#navigation
        - type: nav-actions
          social:
            - platform: github
              url: global.yaml#social.github
            - platform: twitter
              url: global.yaml#social.twitter
          theme_toggle: true
          mobile_toggle: true

behavior:
  - mobile menu toggle (hamburger → close, aria-expanded)
  - theme toggle (light ↔ dark, persists to localStorage via state.js signal)
  - active link highlighting from props.active_path
  - sidebar injection: on pages with .docs-sidebar or .examples-sidebar,
    injects those links into the mobile nav menu for responsive navigation

accessibility:
  role: navigation
  aria_label: "Main navigation"
  keyboard: tab-through-links
  focus: true
  mobile_menu:
    aria_expanded: true
    focus_trap: true

dependencies:
  runtime:
    - "weblisk" # effect() for reactive theme icon updates
    - "../state.js" # theme signal + setTheme
  hydration: load # Critical path — must hydrate immediately
