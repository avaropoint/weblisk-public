# Weblisk Site Identity and Global Configuration
# This is the source of truth for site-wide settings.

name: Weblisk
domain: weblisk.dev
locale: en_US
description: >
  The specification-driven platform for building AI-native applications.
  Describe once, generate everything, own it all.
version: 2.0.0
license: MIT
organization:
  name: Avaropoint
  url: https://avaropoint.com
  github: https://github.com/avaropoint

navigation:
  - label: Home
    path: /
  - label: Platform
    path: /platform/
  - label: Marketplace
    path: /marketplace/
  - label: Docs
    path: /docs/

social:
  github: https://github.com/avaropoint/weblisk
  twitter: https://x.com/weblisk
  discord: https://discord.gg/5CetAq9EgZ

seo:
  title_suffix: " — Weblisk"
  default_og_image: /images/social/og-image.png
  twitter_site: "@weblisk"
  locale: en_US

footer:
  copyright: "© 2026 Made with ♥ by Avaropoint"
  tagline: >
    Software finally has blueprints — describe once, generate forever, own everything.
  columns:
    - heading: Platform
      links:
        - label: Blueprints
          path: /platform/blueprints/
        - label: Agents
          path: /platform/agents/
        - label: Server Spec
          path: /platform/server/
        - label: Client Framework
          path: /platform/client/
    - heading: Ecosystem
      links:
        - label: Marketplace
          path: /marketplace/
        - label: Documentation
          path: /docs/
        - label: Templates
          path: /marketplace/templates/
    - heading: Community
      links:
        - label: GitHub
          url: https://github.com/avaropoint/weblisk
        - label: X (Twitter)
          url: https://x.com/weblisk
        - label: Discord
          url: https://discord.gg/5CetAq9EgZ
        - label: Sponsor
          url: https://github.com/sponsors/avaropoint

# Generated artifact policies
# These drive robots.txt, sitemap.xml, manifest, and sw.js generation.

pwa:
  name: Weblisk
  short_name: Weblisk
  display: standalone
  background_color: "#0b1121"
  theme_color: "#1a1f36"
  start_url: /
  icons: assets/brand.yaml#pwa_icons
  service_worker: true

robots:
  user_agent: "*"
  allow: /
  sitemap: https://weblisk.dev/sitemap.xml

sitemap:
  changefreq: weekly
  priority: 1.0

policies:
  accessibility: WCAG-2.2-AA
  seo: strict
  structured_data: required
  social_meta: required
  performance:
    lcp: 2500
    cls: 0.1
    inp: 200
