# Weblisk Global Blueprint
# Project identity and cross-cutting configuration.

name: Weblisk
domain: weblisk.dev
locale: en-US
locales: [en-US]

brand:
  colors:
    primary: "#3B4F7C"
    primary_hover: "#2D3E64"
    accent: "#0b7d97"
    surface: "#ffffff"
    text: "#0f172a"
    error: "#dc2626"
    success: "#047857"
  typography:
    heading: { family: "Inter", weight: 700 }
    body: { family: "system-ui", weight: 400 }
    mono: { family: "'JetBrains Mono'", weight: 400 }
  spacing: 8px
  radius: 4px
  logo: assets/logo.svg
  favicon: assets/favicon.svg

identity:
  tagline: "The open ecosystem for agentic services"
  description: >
    The first open-source platform to unify a secure, collaborative
    hub and marketplace of autonomous agents. Define what you need
    as blueprints — AI translates them to production code in any
    language or platform of your choice.
  legal_name: Avaropoint
  contact: hello@weblisk.dev
  copyright_year: 2026

social:
  twitter: "@weblisk"
  github: avaropoint/weblisk
  discord: https://discord.gg/5CetAq9EgZ
  og_default_image: /images/social/og-image.png

policies:
  accessibility: WCAG-2.2-AA
  seo: strict
  structured_data: required
  social_meta: required
  performance:
    lcp: 2500
    cls: 0.1
    inp: 200

dependencies: []
