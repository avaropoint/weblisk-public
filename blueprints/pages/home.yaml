        label: Runtime Dependencies
        icon:
          description: Shield with checkmark
          paths:
            - path: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"
            - polyline: "9 12 11 14 15 10"
      - value: "80+"
        label: Specifications
        icon:
          description: Document with lines
          paths:
            - path: "M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
            - polyline: "14 2 14 8 20 8"
            - line: { x1: 16, y1: 13, x2: 8, y2: 13 }
            - line: { x1: 16, y1: 17, x2: 8, y2: 17 }
      - value: "16+"
        label: Architecture Components
        icon:
          description: Stacked layers
          paths:
            - path: "M12 2L2 7l10 5 10-5-10-5z"
            - path: "M2 17l10 5 10-5"
            - path: "M2 12l10 5 10-5"
      - value: "11+"
        label: Infrastructure Agents
        icon:
          description: Lightning bolt
          paths:
            - polygon: "13 2 3 14 12 14 11 22 21 10 12 10 13 2"
      - value: "4+"
        label: Platform Targets
        icon:
          description: Monitor
          paths:
            - rect: { x: 2, y: 3, width: 20, height: 14, rx: 2, ry: 2 }
            - line: { x1: 8, y1: 21, x2: 16, y2: 21 }
            - line: { x1: 12, y1: 17, x2: 12, y2: 21 }

  # What Is a Blueprint?
  - id: blueprints
    type: content-section
    label: Blueprints
    headline: "A blueprint is the specification that brings ideation to realization."
    description: >
      Most organizations rely on software they can't fully see into —
      subscriptions with opaque data practices, stitched-together tools,
      AI outputs no one can verify. Weblisk blueprints are structured
      specifications that capture your exact business logic, security
      requirements, and operational rules. Define it once. Agents
      generate production code and systems from it — verifiable, repeatable,
      and entirely owned by you.
    attributes:
      data-reveal: true
    cards_attributes:
      data-reveal-stagger: true
    cards:
      - icon: edit
        color: purple
        title: "Anyone Can Read It"
        text: >
          No programming required. Founders, product managers, developers,
          and stakeholders can all read, understand, and shape a blueprint.
          Your business logic is documented in structured specification —
          not buried in source code.
      - icon: layers
        color: cyan
        title: "One Source of Truth"
        text: >
          Design, security, integrations, data models, deployments —
          every aspect of your project in one versioned corpus. No
          scattered requirements documents. No architecture diagrams
          that drift from reality. 80+ specs that stay synchronized.
      - icon: check
        color: green
        title: "Built-In Governance"
        text: >
          Five compliance tiers enforce standards automatically — from
          internal tools to regulated enterprise systems. Nothing ships
          that doesn't meet the spec. Audit trails, validation rules,
          and security policies are part of the blueprint, not afterthoughts.
      - icon: bolt
        color: orange
        title: "AI That Doesn't Forget"
        text: >
          AI code generators lose context between sessions. Every prompt
          starts from scratch. Blueprints give AI the complete picture —
          permanently. Define once, generate forever. No re-prompting,
          no hallucinated architecture, no wasted tokens.
      - icon: globe
        color: cyan
        title: "Your Team Can Leave — The Knowledge Stays"
        text: >
          When a developer leaves, companies lose months reverse-engineering
          what was built. The blueprint is the handover — any team, any
          AI, any future developer can execute from it. Zero tribal
          knowledge risk.
      - icon: shield
        color: green
        title: "Upgrades Without Rewrites"
        text: >
          Software evolves — your upgrade path shouldn't be a rewrite.
          With blueprints, every migration is versioned, agent-orchestrated,
          and reversible. Data, infrastructure, agents, and configuration
          evolve together — change management built into the specification
          layer.

  # Generative UI/UX
  - id: blueprint-pipeline
    type: pipeline-showcase
    label: Generative UI/UX
    headline: "See what you specified — not what a vendor decided for you."
    description: >
      Your blueprint is the input. Production-ready code is the output.
      If it specifies a web page, agents generate semantic HTML, scoped
      CSS, and interactive JavaScript. If it specifies an API, they
      generate server code in Go, Rust, or Node.js. You decide what
      gets built — agents handle how. This example shows how this very
      page was built from its blueprint.
    attributes:
      data-reveal: true
    island: pipeline.js
    hydrate: visible
    stages:
      - id: blueprint
        number: 1
        badge: { text: "You write", color: human, icon: user }
        label: Blueprint
        preview:
          language: yaml
          title: pages/home.yaml
          content: |
            - id: hero
              type: hero
              headline: "Software finally has blueprints."
              actions:
                - label: See It In Action
                  style: primary
              install_command: "curl -fsSL …/install.sh | sh"
      - id: generated
        number: 2
        badge: { text: "Generated", color: agent, icon: bolt }
        label: Code Layers
        layers:
          - id: html
            label: HTML
            border_color: pink
            content: |
              <section class="hero">
                <h1>Software finally…</h1>
                <a class="btn">See It…</a>
              </section>
          - id: css
            label: CSS
            border_color: blue
            content: |
              .hero { padding: 6rem 2rem; }
              .btn-primary { background: var(…); }
              .install-cmd { display: flex; }
          - id: js
            label: JS
            border_color: yellow
            content: |
              import { hydrateIslands } from 'weblisk';
              hydrateIslands({ idle, visible, load });
      - id: rendered
        number: 3
        badge: { text: "Live", color: output, animated: pulse }
        label: Final Output
        preview:
          type: mini-hero
          badge: "v1.0 — Your vision, fully generated"
          headline: "Software finally has blueprints."
          subheadline: "Describe what you want. Agents generate every layer."
          cta: "See It In Action →"
    caption: >-
      This page was generated from a blueprint. APIs, agents, and
      platform code are generated the same way — the blueprint defines
      the target.
    connectors:
      - label: Agents process
        style: compact
      - label: Renders
        style: compact
    client_framework_callout:
      headline: "Built using the Weblisk Client Framework"
      description: >-
        Reactive islands that hydrate on demand with zero build dependencies, accept any blueprint-driven
        input, and connect directly to the agents that handle their logic.
        Every section on this page is a live island — specification in,
        reactive UI out.
      link: /platform/client/

  # The Workflow
  - id: the-workflow
    type: content-section
    background: soft
    label: The Workflow
    headline: "One workflow. Full visibility at every step."
    description: >
      Initialize, source, generate, migrate, validate, deploy — every
      step tracked, validated, and reversible. You see exactly what's
      happening at every stage. Agents handle the heavy lifting while
      you stay in control of the process.
    attributes:
      data-reveal: true
    cards_attributes:
      data-reveal-stagger: true
    cards:
      - icon: terminal
        title: "Initialize"
        text: >
          One command scaffolds your project with blueprint structure,
          agent configs, and platform targets. No boilerplate decisions —
          start with a working structure immediately.
        spec: "weblisk init my-project"
      - icon: download
        title: "Source Blueprints"
        text: >
          Pull from the open marketplace, fork community blueprints, or
          write your own from scratch. Compose patterns, mix templates,
          extend anything — your specs, your rules.
        spec: "weblisk add patterns/auth-token"
      - icon: bolt
        title: "Build & Generate"
        text: >
          Generate production code for any language or platform — Go,
          Rust, Node, Cloudflare Workers. Leverage open templates or
          build your own unique specs. One blueprint, infinite targets.
        spec: "weblisk generate --platform cloudflare"
      - icon: refresh
        title: "Transform & Migrate"
        text: >
          Blueprint-versioned, agent-orchestrated migrations across
          your entire stack — data, infrastructure, agents, and
          configuration. Every change diffed, validated, and reversible.
        spec: "weblisk migrate --validate"
      - icon: eye
        title: "Preview & Validate"
        text: >
          See exactly what ships before it goes live. Auto-approve when
          all criteria pass — schema validation, security checks, quality
          gates. Full confidence before production.
        spec: "weblisk preview --validate"
      - icon: cloud-upload
        title: "Deploy & Monitor"
        text: >
          Validated, versioned, deployed — with schema checks and
          automatic rollback. Domain-expert agents continuously monitor
          every layer, ensuring enterprise standards, best practices,
          and protocol compliance.
        spec: "weblisk deploy --auto-rollback"
    loop_label: "Continuous improvement — domain-expert agents monitor every layer, the loop never stops"

  # Architecture
  - id: architecture
    type: content-section
    background: soft
    label: Architecture
    headline: "Seven layers. All open. All yours."
    description: >
      Weblisk exposes every layer — from wire protocol to marketplace —
      as open, specified, and interconnected. You decide which layers to
      use, extend, or replace. The architecture is transparent by design
      because we believe you should understand the systems you depend on.
    attributes:
      data-reveal: true
    interactive_diagram:
      island: arch-diagram.js
      hydrate: visible
      svg_viewbox: "0 0 560 540"
      layers:
        - id: protocol
          label: "Protocol"
          sublabel: "HTTP+JSON · Wire Format · Standard API Contracts"
          rect: { x: 30, y: 0, width: 500, height: 60 }
          detail:
            title: "Protocol"
            text: >
              HTTP + JSON wire format that standardizes communication
              across every Weblisk project. Standard API contracts,
              consistent request/response shapes, and versioned endpoints.
            link:
              label: Protocol specs →
              href: /platform/blueprints/protocol.html
        - id: federation
          label: "Federation"
          sublabel: "Ed25519 · Hub-to-Hub Trust · Cryptographic Verification"
          rect: { x: 30, y: 70, width: 500, height: 60 }
          detail:
            title: "Federation"
            text: >
              Ed25519 identity signing with hub-to-hub cryptographic trust
              verification. Federation protocol enables collaboration across
              independent hubs — every message signed, every agent verified,
              every data contract enforced.
            link:
              label: Federation specs →
              href: /platform/blueprints/federation.html
        - id: schemas
          label: "Schemas & Validation"
          sublabel: "5 Compliance Tiers · Enforced Standards · Versioning"
          rect: { x: 30, y: 140, width: 500, height: 60 }
          detail:
            title: "Schemas & Validation"
            text: >
              Five compliance tiers — from sandbox to certified. Every
              blueprint validated against Weblisk schemas before it can
              register, publish, or interact with other agents. Enterprise
              standards, enforced automatically.
            link:
              label: Schema specs →
              href: /platform/blueprints/schemas.html
        - id: agents
          label: "Agents"
          sublabel: "Domain · Infrastructure · Task · Quality · Lifecycle"
          rect: { x: 30, y: 210, width: 500, height: 60 }
          detail:
            title: "Agents"
            text: >
              11 infrastructure agents plus unlimited domain agents.
              Each sandboxed, portable, and AI-ready. Agents register
              capabilities, execute tasks, and collaborate autonomously
              across your entire system.
            link:
              label: Agent catalog →
              href: /platform/agents/
        - id: patterns
          label: "Patterns"
          sublabel: "API · Auth · Governance · Webhooks · Workflows · Storage"
          rect: { x: 30, y: 280, width: 500, height: 60 }
          detail:
            title: "Patterns"
            text: >
              48+ cross-cutting contracts — API, auth, governance,
              webhooks, workflows, storage, deployment, and more.
              Each pattern generates real endpoints with real security
              and real validation.
            link:
              label: Pattern catalog →
              href: /platform/blueprints/patterns.html
        - id: platforms
          label: "Platforms"
          sublabel: "Cloudflare Workers · Go · Rust · Node.js"
          rect: { x: 30, y: 350, width: 500, height: 60 }
          detail:
            title: "Platforms"
            text: >
              Languages: Go, Rust, Node.js. Platforms: Cloudflare
              Workers today, with AWS, GCP, Azure adapters on the
              roadmap. One blueprint, any target.
            link:
              label: Explore platforms →
              href: /platform/
        - id: ecosystem
          label: "Marketplace & Hub Network"
          sublabel: "Open Blueprints · Templates · Community Hub · Collaboration"
          rect: { x: 30, y: 420, width: 500, height: 60 }
          detail:
            title: "Marketplace & Hub Network"
            text: >
              Share blueprints on the open marketplace. Fork community
              templates. Collaborate across hubs with cryptographic
              data contracts. Build your own blueprints and publish
              them for others to compose into their projects.
            link:
              label: Explore the marketplace →
              href: /marketplace/
      hint: "Hover or tap a layer to explore"

  # Comparison
  - id: comparison
    type: comparison-table
    label: Comparison
    headline: "A different way to think about software."
    description: >-
      Renting features through subscriptions works — until it doesn't.
      Re-prompting AI works — until context is lost. Custom builds work —
      until the team changes. Weblisk is the specification layer that
      makes true ownership practical, so you can control every layer of
      data moving in and out of your organization.
    attributes:
      data-reveal: true
    highlight_column: Weblisk
    columns:
      - Weblisk
      - Build from scratch
      - SaaS platform
      - AI code gen
    rows:
      - feature: Persistent specification
        values: ["80+ blueprints", "None", "Vendor-owned", "None"]
      - feature: Multi-language generation
        values: ["Go · Rust · Node.js", "N/A", "No", "Partial"]
      - feature: Platform targets
        values: ["Cloudflare Workers + more", "Manual", "Vendor-locked", "No"]
      - feature: You own the output
        values: ["100%", "Yes", "Vendor lock-in", "Fragile"]
      - feature: Agent orchestration
        values: ["Built-in", "Build yourself", "Vendor-controlled", "No"]
      - feature: Federation
        values: ["Cryptographic hub-to-hub", "Custom integration", "No", "No"]
      - feature: Governance
        values: ["Schema-enforced, 5 tiers", "Manual policies", "Vendor-defined", "None"]
      - feature: Specification validation
        values: ["Schema-enforced", "Manual review", "N/A", "No"]
      - feature: Security model
        values: ["Ed25519, ABAC, 7-layer", "Build yourself", "Shared tenancy", "None"]
      - feature: Upgrade path
        values: ["Versioned, validated, reversible", "Rewrite", "Vendor roadmap", "Re-prompt"]
