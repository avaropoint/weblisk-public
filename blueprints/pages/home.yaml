  # Getting Started
  - id: getting-started
    type: getting-started
    label: Getting Started
    headline: "Up and running in three steps."
    description: >
      Install the CLI, define your first domain, and generate
      production code.
    attributes:
      data-reveal: true
    steps_attributes:
      data-reveal-stagger: true
    layout: vertical-timeline
    steps:
      - number: 1
        color: purple
        title: Install the CLI
        description: >
          One command. No dependencies. Works on macOS, Linux, and WSL.
        code:
          title: Terminal
          content: |
            $ curl -fsSL https://cdn.weblisk.dev/install.sh | sh
            ✓ Weblisk CLI installed to ~/.weblisk/bin/weblisk
      - number: 2
        color: cyan
        title: Define your domain
        description: >
          Initialise a project and compose patterns into a domain
          blueprint.
        code:
          title: Terminal
          content: |
            $ weblisk init my-project
            ✓ Created my-project/ with blueprint scaffolding

            $ weblisk domain create chat \
                --patterns api-ai,auth-token,realtime-chat
            ✓ Domain "chat" created with 3 patterns
      - number: 3
        color: green
        title: Generate and deploy
        description: >
          Generate production code for your target platform and deploy.
        code:
          title: Terminal
          content: |
            $ weblisk generate --platform cloudflare
            ✓ Generated 24 endpoints, 3 agents, 7 patterns
            ✓ Output: ./generated/

            $ weblisk deploy
            ✓ Deployed to production (schema validated, data preserved)
    cta:
      label: Read the Quick Start Guide
      href: /docs/quick-start.html
      style: primary

