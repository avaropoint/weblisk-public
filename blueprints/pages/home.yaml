    - type: FAQPage
      questions:
        - q: What is Weblisk?
          a: >
            Weblisk is a full stack zero dependency open-source framework that takes the guesswork
            out of building complex applications. Over 80 interlocking
            blueprints capture your exact requirements — security, data,
            integrations, deployments — and agents generate production
            code in Go, Rust, or Node.js that you fully own. No vendor
            lock-in. Full control of your data. Collaborate on your
            terms through trusted hub networks.
        - q: What are Weblisk Blueprints?
          a: >
            Blueprints are structured specifications that define exactly
            how your application works — business logic, security models,
            API contracts, agent behaviour, and deployment targets.
            Anyone can read them — founders, product managers, developers.
            Agents consume blueprints to generate complete production
            systems. The framework is open source. The code it generates
            belongs to you.
        - q: Why use Weblisk instead of AI code generators like Claude or ChatGPT?
          a: >
            AI code generators lose context between sessions — every
            prompt starts from scratch, outputs are non-deterministic,
            and architecture decisions drift over time. Weblisk
            blueprints give AI a permanent, structured specification to
            generate from. Define once, generate forever. No
            re-prompting, no hallucinated architecture, no wasted
            tokens. AI is used selectively where it helps, with
            governance where it matters.
        - q: How does Weblisk compare to SaaS platforms?
          a: >
            SaaS platforms offer convenience, but the trade-off is often
            limited control over your data, your roadmap, and your
            costs. With Weblisk, you define your exact requirements as
            blueprints and generate systems you fully own. Your data
            stays where you put it, and you set the guardrails for how
            it moves in and out of your organization.
        - q: Is Weblisk free?
          a: >
            Yes. The Weblisk framework — all specifications, the CLI,
            and the client framework — is free and MIT-licensed. Any
            code you generate with it is yours to use however you
            choose. The Weblisk Marketplace enables buying and selling
            community-created blueprints, agents, and templates so you
            can start from proven patterns instead of building from
            scratch.
        - q: How does Weblisk protect my data and handle upgrades?
          a: >
            Migrations in Weblisk are blueprint-versioned and
            agent-orchestrated across your entire stack — data,
            infrastructure, agents, and configuration. Every change is
            diffed, validated, and reversible. Your data stays where
            you put it — no vendor-managed migrations, no surprise
            breaking changes.
        - q: What platforms does Weblisk support?
          a: >
            Weblisk starts with Cloudflare Workers as the primary
            deployment target, with reference implementations in Go,
            Rust, and Node.js. The goal is to generate production code
            for any platform — AWS, GCP, Azure, and beyond — from a
            single specification corpus.

