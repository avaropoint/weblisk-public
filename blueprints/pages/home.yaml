# ── Responsive Design Rules ──────────────────────────────────────────────────
# These constraints MUST be satisfied by the generated CSS.
responsive:
  global:
    - body and html MUST have overflow-x: hidden to prevent horizontal scroll
    - All sections use padding (not fixed widths) for horizontal spacing
    - Code blocks (pre) MUST have overflow-x: auto and max-width: 100%
    - Grid children MUST have min-width: 0 to prevent grid blowout
    - The install_command element MUST wrap or scroll on narrow viewports

  breakpoints:
    desktop: ">= 1024px"
    tablet: "768px – 1023px"
    phone: "481px – 767px"
    small_phone: "<= 480px"

  rules:
    - selector: ".section-inner"
      constraints:
        - overflow: hidden (contain child overflow)
        - max-width: var(--wl-max-width) with auto margins

    - selector: ".install-cmd"
      constraints:
        - max-width: 100% on all viewports
        - overflow-x: auto with hidden scrollbar on small screens
        - word-break or horizontal scroll when content exceeds container

    - selector: ".gs-step-content .code-window"
      constraints:
        - min-width: 0 (prevent grid blowout)
        - code-body pre: overflow-x auto, max-width 100%

    - selector: ".split-pane"
      constraints:
        - Children get min-width: 0 to prevent grid overflow
        - Stacks vertically below 768px

    - selector: ".code-window, .code-body pre"
      constraints:
        - max-width: 100% at all breakpoints
        - overflow-x: auto on pre elements

    - selector: ".xray-showcase"
      constraints:
        - Stacks at 900px
        - Code layers truncate with overflow: hidden

    - selector: ".comparison-table"
      constraints:
        - Wrapped in overflow-x: auto container
        - min-width on table for horizontal scroll on small screens

sections:

  # Hero
  - id: hero
    type: hero
    badge:
      text: "v1.0 — Your vision, fully generated"
      icon: dot
    headline: "Software finally has blueprints."
    subheadline: >
      AI is the most powerful tool ever created for building software —
      and the biggest risk to running it without governance. Weblisk is
      a full stack zero dependency open-source framework built around
      the idea that enterprise software needs blueprints — structured
      specifications that define your exact requirements across security,
      data, integrations, and deployments. Agents consume those blueprints
      and generate production code you fully own, in any language, for
      any platform — with enforceable boundaries that ensure nothing
      enters or exits your system without explicit consent. The framework
      is open source. The generated code is yours.
    actions:
      - label: See It In Action
        href: /platform/
        style: primary
      - label: Start Building
        href: /docs/quickstart.html
        style: outline
    trust_signals:
      - icon: file-text
        text: You own every line
      - icon: bolt
        text: Open-source framework, MIT-licensed
      - icon: shield
        text: AI where it helps, control where it matters
    install_command: "curl -fsSL https://cdn.weblisk.dev/install.sh | sh"
    styles:
      install_cmd:
        margin_bottom: 1.5rem
      trust_signals:
        layout: flex-row-center
        gap: 1.5rem
        wrap: true
        margin_top: 0.5rem
        item:
          display: inline-flex
          align_items: center
          gap: 0.4rem
          font_size: 0.85rem
          font_weight: 500
          color: var(--wl-text-muted)
          icon_color: var(--wl-primary)
          icon_size: 16
      trust_signal_icons:
        type: inline-svg
        stroke_width: 2
        size: 16
        icons:
          describe_once:
            description: Document with lines
            paths:
              - path: "M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
              - polyline: "14 2 14 8 20 8"
              - line: { x1: 16, y1: 13, x2: 8, y2: 13 }
              - line: { x1: 16, y1: 17, x2: 8, y2: 17 }
          generate_forever:
            description: Shuffle/branch arrows
            paths:
              - polyline: "16 3 21 3 21 8"
              - line: { x1: 4, y1: 20, x2: 21, y2: 3 }
              - polyline: "21 16 21 21 16 21"
              - line: { x1: 15, y1: 15, x2: 21, y2: 21 }
              - line: { x1: 4, y1: 4, x2: 9, y2: 9 }
          own_everything:
            description: Shield
            paths:
              - path: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"

  # Stats
  - id: stats
    type: stats-bar
    background: soft
    attributes:
      data-reveal: true
    island: stat-counter.js
    hydrate: visible
    items:
      - value: "0"
        label: Runtime Dependencies
        icon:
          description: Shield with checkmark
          paths:
            - path: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"
            - polyline: "9 12 11 14 15 10"
      - value: "97+"
        label: Specifications
        icon:
          description: Document with lines
          paths:
            - path: "M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
            - polyline: "14 2 14 8 20 8"
            - line: { x1: 16, y1: 13, x2: 8, y2: 13 }
            - line: { x1: 16, y1: 17, x2: 8, y2: 17 }
      - value: "7+"
        label: Architecture Layers
        icon:
          description: Stacked layers
          paths:
            - path: "M12 2L2 7l10 5 10-5-10-5z"
            - path: "M2 17l10 5 10-5"
            - path: "M2 12l10 5 10-5"
      - value: "40+"
        label: Cross-Cutting Patterns
        icon:
          description: Grid of four squares
          paths:
            - rect: { x: 3, y: 3, width: 7, height: 7 }
            - rect: { x: 14, y: 3, width: 7, height: 7 }
            - rect: { x: 14, y: 14, width: 7, height: 7 }
            - rect: { x: 3, y: 14, width: 7, height: 7 }
      - value: "11+"
        label: Autonomous Agents
        icon:
          description: Lightning bolt
          paths:
            - polygon: "13 2 3 14 12 14 11 22 21 10 12 10 13 2"

  # What Is a Blueprint?
  - id: blueprints
    type: content-section
    label: Blueprints
    headline: "The missing layer between what you need and what AI generates."
    description: >
      AI can generate code. What it can't do is govern itself — hold
      the full context of your system, enforce security models, data
      contracts, compliance rules, and integration boundaries across
      sessions, teams, and time. Blueprints are that governance layer.
      They're structured specifications that capture your exact business
      logic, security requirements, and operational rules in a format
      that humans can read and agents can execute. Define it once.
      Generate from it repeatedly — verifiable, repeatable, and
      entirely yours.
    attributes:
      data-reveal: true
    cards_attributes:
      data-reveal-stagger: true
    cards:
      - icon: edit
        color: purple
        title: "Anyone Can Read It"
        text: >
          No programming required. Founders, product managers, developers,
          and stakeholders can all read, understand, and shape a blueprint.
          Your business logic is documented in structured specification —
          not buried in source code.
      - icon: layers
        color: cyan
        title: "One Source of Truth"
        text: >
          Design, security, integrations, data models, deployments —
          every aspect of your project in one versioned corpus. No
          scattered requirements documents. No architecture diagrams
          that drift from reality. 97+ specs that stay synchronized.
      - icon: check
        color: green
        title: "Define Once, Generate Forever"
        text: >
          No re-prompting. No lost context. No starting from scratch
          every session. The blueprint holds your requirements
          permanently — generate from it whenever you need, in any
          language, for any platform. Same input, same output, every
          time.
      - icon: bolt
        color: orange
        title: "AI That Doesn't Forget"
        text: >
          AI memory remembers conversations. Blueprints define enforceable
          contracts. Memory can't validate generated code against 50+
          compliance checks, can't enforce behavioral boundaries on running
          agents, and can't orchestrate 7-stage migration pipelines.
          Blueprints give AI the structure it needs to generate verifiable
          systems — not just code snippets.
      - icon: globe
        color: cyan
        title: "The Knowledge Stays"
        text: >
          People move on — roles change, contributors rotate, priorities
          shift. The blueprint holds everything that was decided and why.
          Any person, any AI, any future contributor can pick up where
          the last one left off. Zero tribal knowledge risk.
      - icon: shield
        color: green
        title: "Upgrades Without Rewrites"
        text: >
          Software evolves — your upgrade path shouldn't be a rewrite.
          With blueprints, every migration is versioned, agent-orchestrated,
          and reversible. Data, infrastructure, agents, and configuration
          evolve together — change management built into the specification
          layer.

  # Generative UI/UX
  - id: blueprint-pipeline
    type: pipeline-showcase
    label: Generative UI/UX
    headline: "From specification to production — nothing hidden."
    description: >
      Your blueprint is the input. Production-ready code is the output.
      If it specifies a web page, agents generate semantic HTML, scoped
      CSS, and interactive JavaScript. If it specifies an API, they
      generate server code in Go, Rust, or Node.js. Every layer is
      visible, every decision traceable back to the spec. This example
      shows how this very page was built from its blueprint.
    attributes:
      data-reveal: true
    island: pipeline.js
    hydrate: visible
    stages:
      - id: blueprint
        number: 1
        badge: { text: "You write", color: human, icon: user }
        label: Blueprint
        preview:
          language: yaml
          title: pages/home.yaml
          content: |
            - id: hero
              type: hero
              headline: "Software finally has blueprints."
              actions:
                - label: See It In Action
                  style: primary
              install_command: "curl -fsSL …/install.sh | sh"
      - id: generated
        number: 2
        badge: { text: "Generated", color: agent, icon: bolt }
        label: Code Layers
        layers:
          - id: html
            label: HTML
            border_color: pink
            content: |
              <section class="hero">
                <h1>Software finally…</h1>
                <a class="btn">See It…</a>
              </section>
          - id: css
            label: CSS
            border_color: blue
            content: |
              .hero { padding: 6rem 2rem; }
              .btn-primary { background: var(…); }
              .install-cmd { display: flex; }
          - id: js
            label: JS
            border_color: yellow
            content: |
              import { hydrateIslands } from 'weblisk';
              hydrateIslands({ idle, visible, load });
      - id: rendered
        number: 3
        badge: { text: "Live", color: output, animated: pulse }
        label: Final Output
        preview:
          type: mini-hero
          badge: "v1.0 — Your vision, fully generated"
          headline: "Software finally has blueprints."
          subheadline: "Describe what you want. Agents generate every layer."
          cta: "See It In Action →"
    caption: >-
      This page was generated from a blueprint. Click the </> on any
      section to X-Ray the blueprint source and generated code side by side.
    connectors:
      - label: Agents process
        style: compact
      - label: Renders
        style: compact
    client_framework_callout:
      headline: "Built using the Weblisk Client Framework"
      description: >-
        Reactive islands that hydrate on demand with zero build dependencies, accept any blueprint-driven
        input, and connect directly to the agents that handle their logic.
        Every section on this page is a live island — specification in,
        reactive UI out.
      link: /platform/client/

  # The Workflow
  - id: the-workflow
    type: content-section
    background: soft
    label: The Workflow
    headline: "One workflow. Full visibility at every step."
    description: >
      Initialize, source, generate, migrate, validate, deploy — every
      step tracked, validated, and reversible. You see exactly what's
      happening at every stage. Agents handle the heavy lifting while
      you stay in control of the process.
    attributes:
      data-reveal: true
    cards_attributes:
      data-reveal-stagger: true
    cards:
      - icon: terminal
        title: "Initialize"
        text: >
          One command scaffolds your project with blueprint structure,
          agent configs, and platform targets. No boilerplate decisions —
          start with a working structure immediately.
        spec: "weblisk init my-project"
      - icon: download
        title: "Source Blueprints"
        text: >
          Pull from the open marketplace, fork community blueprints, or
          write your own from scratch. Compose patterns, mix templates,
          extend anything — your specs, your rules.
        spec: "weblisk add patterns/auth-token"
      - icon: bolt
        title: "Build & Generate"
        text: >
          Generate production code for any language or platform — Go,
          Rust, Node, Cloudflare Workers. Leverage open templates or
          build your own unique specs. One blueprint, infinite targets.
        spec: "weblisk generate --platform cloudflare"
      - icon: refresh
        title: "Transform & Migrate"
        text: >
          Blueprint-versioned, agent-orchestrated migrations across
          your entire stack — data, infrastructure, agents, and
          configuration. Every change diffed, validated, and reversible.
        spec: "weblisk migrate --validate"
      - icon: eye
        title: "Preview & Validate"
        text: >
          See exactly what ships before it goes live. Auto-approve when
          all criteria pass — schema validation, security checks, quality
          gates. Full confidence before production.
        spec: "weblisk preview --validate"
      - icon: cloud-upload
        title: "Deploy & Monitor"
        text: >
          Validated, versioned, deployed — with schema checks and
          automatic rollback. Domain-expert agents continuously monitor
          every layer, ensuring enterprise standards, best practices,
          and protocol compliance.
        spec: "weblisk deploy --auto-rollback"
    loop_label: "Continuous improvement — domain-expert agents monitor every layer, the loop never stops"

  # Architecture
  - id: architecture
    type: content-section
    background: soft
    label: Architecture
    headline: "Seven layers. All open. All yours."
    description: >
      Weblisk exposes every layer — from wire protocol to marketplace —
      as open, specified, and interconnected. A non-bypassable enforcement
      boundary inspects every operation at four checkpoints (message,
      storage, external, response) regardless of whether agents cooperate.
      You decide which layers to use, extend, or replace. The architecture
      is transparent by design because we believe you should understand
      the systems you depend on.
    attributes:
      data-reveal: true
    interactive_diagram:
      island: arch-diagram.js
      hydrate: visible
      svg_viewbox: "0 0 560 540"
      layers:
        - id: protocol
          label: "Protocol"
          sublabel: "HTTP+JSON · Wire Format · Standard API Contracts"
          rect: { x: 30, y: 0, width: 500, height: 60 }
          detail:
            title: "Protocol"
            text: >
              HTTP + JSON wire format that standardizes communication
              across every Weblisk project. Standard API contracts,
              consistent request/response shapes, and versioned endpoints.
            link:
              label: Protocol specs →
              href: /platform/blueprints/protocol.html
        - id: federation
          label: "Federation"
          sublabel: "ML-DSA-65 · Hub-to-Hub Trust · Post-Quantum Verification"
          rect: { x: 30, y: 70, width: 500, height: 60 }
          detail:
            title: "Federation"
            text: >
              Post-quantum identity signing (ML-DSA-65, FIPS 204) with
              hub-to-hub cryptographic trust verification. Federation
              protocol enables collaboration across independent hubs —
              every message signed, every agent verified, every data
              contract enforced. Quantum-resistant by default.
            link:
              label: Federation specs →
              href: /platform/blueprints/federation.html
        - id: schemas
          label: "Schemas & Validation"
          sublabel: "5 Compliance Tiers · Enforced Standards · Versioning"
          rect: { x: 30, y: 140, width: 500, height: 60 }
          detail:
            title: "Schemas & Validation"
            text: >
              Five compliance tiers — from sandbox to certified. Every
              blueprint runs through a 4-phase validation pipeline with
              50+ checks before it can register, publish, or interact
              with other agents. Content hashing detects post-generation
              tampering. Enterprise standards, enforced automatically —
              not by trust, but by architecture.
            link:
              label: Schema specs →
              href: /platform/blueprints/schemas.html
        - id: agents
          label: "Agents"
          sublabel: "Domain · Infrastructure · Task · Quality · Lifecycle"
          rect: { x: 30, y: 210, width: 500, height: 60 }
          detail:
            title: "Agents"
            text: >
              11 infrastructure agents plus unlimited domain agents.
              Each sandboxed, portable, and AI-ready. Agents register
              capabilities, execute tasks, and collaborate autonomously
              across your entire system.
            link:
              label: Agent catalog →
              href: /platform/agents/
        - id: patterns
          label: "Patterns"
          sublabel: "API · Auth · Governance · Webhooks · Workflows · Storage"
          rect: { x: 30, y: 280, width: 500, height: 60 }
          detail:
            title: "Patterns"
            text: >
              40 cross-cutting contracts — API, auth, governance,
              webhooks, workflows, storage, deployment, and more.
              Each pattern generates real endpoints with real security
              and real validation. Patterns compose together with explicit
              dependency contracts — policies can only add restrictions,
              never loosen them.
            link:
              label: Pattern catalog →
              href: /platform/blueprints/patterns.html
        - id: platforms
          label: "Platforms"
          sublabel: "Cloudflare Workers · Go · Rust · Node.js"
          rect: { x: 30, y: 350, width: 500, height: 60 }
          detail:
            title: "Platforms"
            text: >
              Languages: Go, Rust, Node.js. Platforms: Cloudflare
              Workers today, with AWS, GCP, Azure adapters on the
              roadmap. One blueprint, any target.
            link:
              label: Explore platforms →
              href: /platform/
        - id: ecosystem
          label: "Marketplace & Hub Network"
          sublabel: "Open Blueprints · Templates · Community Hub · Collaboration"
          rect: { x: 30, y: 420, width: 500, height: 60 }
          detail:
            title: "Marketplace & Hub Network"
            text: >
              Share blueprints on the open marketplace. Fork community
              templates. Collaborate across hubs with cryptographic
              data contracts. Build your own blueprints and publish
              them for others to compose into their projects.
            link:
              label: Explore the marketplace →
              href: /marketplace/
      hint: "Hover or tap a layer to explore"

  # Governance
  - id: governance
    type: content-section
    label: Governance
    headline: "AI without boundaries is a liability. We built the boundaries."
    description: >
      Every AI framework lets agents act. None of them enforce what
      agents can't do. Weblisk is the first framework where governance
      isn't a policy document — it's architecture. Non-bypassable
      enforcement boundaries inspect every operation at every layer.
      Nothing enters or exits your system without explicit consent —
      not data, not agent actions, not external service calls. This
      isn't configuration. It's how the framework works.
    attributes:
      data-reveal: true
    cards_attributes:
      data-reveal-stagger: true
    cards:
      - icon: shield
        color: purple
        title: "Non-Bypassable Enforcement"
        text: >
          Four checkpoints — message, storage, external, response —
          inspect every operation regardless of agent cooperation.
          This isn't middleware that can be skipped. It's a boundary
          built into the architecture that agents cannot circumvent,
          period.
      - icon: lock
        color: cyan
        title: "Explicit Consent Boundaries"
        text: >
          Data doesn't move without permission. Agent actions don't
          execute without authorization. External services don't
          connect without policy. Every boundary crossing requires
          explicit consent defined in your blueprints — protecting
          your most valuable assets: your data and intellectual
          property.
      - icon: link
        color: green
        title: "Works With Any AI"
        text: >
          Not locked to specific frameworks. Weblisk wraps LangChain,
          CrewAI, Google ADK, or any other AI tool — unmodified —
          while enforcing governance at every boundary. Use whatever
          AI you want. The governance layer ensures it operates
          within your rules.
      - icon: trending-up
        color: orange
        title: "Security That Only Gets Stronger"
        text: >
          Monotonic security means policies can only add restrictions —
          never loosen them. No configuration change, no prompt, no
          agent can reduce your security posture. Once a boundary is
          set, it holds. This is how enterprise security should work.
      - icon: eye
        color: purple
        title: "Rogue Agent Detection"
        text: >
          Behavioral fingerprinting identifies when agents deviate
          from expected patterns. Anomalous behavior triggers
          quarantine escalation — isolating compromised or
          malfunctioning agents before they can impact your system
          or your data.
      - icon: database
        color: cyan
        title: "Data Sovereignty"
        text: >
          Your data stays where you put it. Blueprint-defined
          policies control exactly what enters and exits your
          organization. Cryptographic federation enables collaboration
          across trusted hub networks — with real data contracts, not
          handshake agreements.

