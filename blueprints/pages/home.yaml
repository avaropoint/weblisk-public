      languages: [Go, Rust, "Node.js"]
      repository: "https://github.com/avaropoint/weblisk"
      partOf: "https://weblisk.dev/#website"
    - type: FAQPage
      questions:
        - q: What is Weblisk?
          a: >
            Weblisk is a zero-dependency open-source framework for
            defining and orchestrating agentic services — autonomous,
            interconnected domains that power your business. Describe a
            service as a blueprint. Build it, consume it, or publish it
            to the marketplace. You decide what runs, where it runs,
            and how your data is managed.
        - q: What are Weblisk Blueprints?
          a: >
            Blueprints are structured descriptions of what you want to
            build — your business logic, security rules, data models,
            integrations, and deployment targets — written in a format
            that both people and agents understand. Anyone on your team
            can read and shape them. Agents use blueprints to generate
            complete production systems. The framework is open source.
            The code it generates belongs to you.
        - q: Why use Weblisk instead of AI code generators like Claude or ChatGPT?
          a: >
            AI code generators lose context between sessions — every
            prompt starts from scratch. Weblisk blueprints give AI a
            permanent, structured description to generate from. Define
            once, generate forever. No re-prompting, no hallucinated
            architecture, no context drift.
        - q: How does Weblisk compare to SaaS platforms?
          a: >
            SaaS platforms offer convenience, but you trade control of
            your data, roadmap, and costs. With Weblisk, you describe
            your exact requirements as blueprints and generate systems
            you fully own. Your data stays where you put it, and you
            decide how it moves in and out of your organization.
        - q: Is Weblisk free?
          a: >
            Yes. The Weblisk framework — all specifications, the CLI,
            and the client framework — is free and MIT-licensed. Any
            code you generate with it is yours to use however you
            choose. The Weblisk Marketplace enables buying and selling
            community-created blueprints, agents, and templates so you
            can start from proven patterns instead of building from
            scratch.
        - q: How does Weblisk protect my data and handle upgrades?
          a: >
            Migrations in Weblisk are blueprint-versioned and
            agent-orchestrated across your entire stack — data,
            infrastructure, agents, and configuration. Every change is
            diffed, validated, and reversible. Your data stays where
            you put it — no vendor-managed migrations, no surprise
            breaking changes.
        - q: How does Weblisk govern AI agents?
          a: >
            Weblisk enforces non-bypassable boundaries at four
            checkpoints — message, storage, external, and response —
            on every operation. Agents cannot circumvent these boundaries
            regardless of their framework or behavior. Policies are
            monotonic (can only add restrictions, never loosen),
            behavioral fingerprinting detects anomalous patterns, and
            quarantine escalation isolates compromised agents
            automatically. This governance layer works with any AI
            framework while ensuring nothing crosses boundaries without
            explicit consent.
        - q: What platforms does Weblisk support?
          a: >
            Weblisk blueprints generate production code for any language
            or platform — Go, Rust, Node.js, and Cloudflare Workers
            ship today, with community and marketplace generators
            extending support further. One blueprint, any target —
            switch platforms without rewriting your application.

