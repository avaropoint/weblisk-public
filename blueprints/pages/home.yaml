  # What Is a Blueprint?
  - id: what-is-a-blueprint
    type: content-section
    label: The Foundation
    headline: "A blueprint is your project's single source of truth."
    description: >
      Not a template. Not a config file. A structured YAML specification
      that captures your entire domain — what your project does, how
      it's secured, where it deploys, and which agents maintain it. You
      describe what you want. Domain-expert agents generate every layer
      of production code. The blueprint is permanent. Code is just its
      latest expression.
    attributes:
      data-reveal: true
    cards_attributes:
      data-reveal-stagger: true
    cards:
      - icon: edit
        color: purple
        title: "Readable by Anyone"
        text: >
          No programming knowledge required. Product managers, designers,
          founders — anyone can read and write a blueprint. It's
          structured YAML, not source code.
      - icon: layers
        color: cyan
        title: "Controls Everything"
        text: >
          Design, security, integrations, data models, deployments,
          agent behavior — every aspect of your project, specified in
          one versioned corpus.
      - icon: check
        color: green
        title: "Generates Deterministically"
        text: >
          Same blueprint, same output. Every time. No drift, no
          surprises, no "works on my machine." Reproduce any build
          from any point in history.
      - icon: bolt
        color: orange
        title: "Eliminates AI Waste"
        text: >
          Define once, generate forever. No re-prompting, no token
          churn, no hallucinated architecture. Blueprints give AI the
          structured context it needs to produce correct, reproducible
          output on every pass.

  # Generative UI/UX
  - id: blueprint-pipeline
    type: pipeline-showcase
    label: Generative UI/UX
    headline: "From blueprint to functional UI/UX — every layer, meticulously generated."
    description: >
      Real-time generative UI/UX, powered by domain expertise. You
      write one YAML blueprint. Agents with deep architectural
      knowledge read it and generate every layer of production code —
      semantic HTML, scoped CSS, interactive JavaScript — in a
      continuous, intelligent feedback loop from ideation to production.
      No templates. No boilerplate. No re-prompting.
    attributes:
      data-reveal: true
    island: pipeline.js
    hydrate: visible
    stages:
      - id: blueprint
        number: 1
        badge: { text: "You write", color: human, icon: user }
        label: Blueprint
        preview:
          language: yaml
          title: pages/home.yaml
          content: |
            - id: hero
              type: hero
              headline: "Software finally has blueprints."
              actions:
                - label: See It In Action
                  style: primary
              install_command: "curl -fsSL …/install.sh | sh"
      - id: generated
        number: 2
        badge: { text: "Generated", color: agent, icon: bolt }
        label: Code Layers
        layers:
          - id: html
            label: HTML
            border_color: pink
            content: |
              <section class="hero">
                <h1>Software finally…</h1>
                <a class="btn">See It…</a>
              </section>
          - id: css
            label: CSS
            border_color: blue
            content: |
              .hero { padding: 6rem 2rem; }
              .btn-primary { background: var(…); }
              .install-cmd { display: flex; }
          - id: js
            label: JS
            border_color: yellow
            content: |
              import { hydrateIslands } from 'weblisk';
              hydrateIslands({ idle, visible, load });
      - id: rendered
        number: 3
        badge: { text: "Live", color: output, animated: pulse }
        label: Final Output
        preview:
          type: mini-hero
          badge: "v1.0 — Your vision, fully generated"
          headline: "Software finally has blueprints."
          subheadline: "Describe what you want. Agents generate every layer."
          cta: "See It In Action →"
    caption: >-
      This is how this very page was built — every section you see was
      generated from a blueprint.

  # The Workflow
  - id: the-workflow
    type: content-section
    background: soft
    label: The Workflow
    headline: "From ideation to production — and every step in between."
    description: >
      This isn't a simplified demo. This is the real workflow. Initialize
      your project, source or create blueprints, generate production code
      for any platform, handle migrations between versions, preview
      changes, and deploy — all orchestrated by domain-expert agents that
      understand every layer of your stack.
    attributes:
      data-reveal: true
    cards_attributes:
      data-reveal-stagger: true
    cards:
      - icon: terminal
        title: "Initialize"
        text: >
          One command scaffolds your project with blueprint structure,
          agent configs, and platform targets. No boilerplate decisions —
          start with a working structure immediately.
        spec: "weblisk init my-project"
      - icon: download
        title: "Source Blueprints"
        text: >
          Pull from the open marketplace, fork community blueprints, or
          write your own from scratch. Compose patterns, mix templates,
          extend anything — your specs, your rules.
        spec: "weblisk add patterns/auth-token"
      - icon: bolt
        title: "Build & Generate"
        text: >
          Generate production code for any language or platform — Go,
          Rust, Node, Cloudflare Workers. Leverage open templates or
          build your own unique specs. One blueprint, infinite targets.
        spec: "weblisk generate --platform cloudflare"
      - icon: refresh
        title: "Transform & Migrate"
        text: >
          Handle schema migrations, data transformations, and
          infrastructure transitions between versions. Every change is
          diffed, validated, and reversible — nothing is left to chance.
        spec: "schemas/*.yaml → migrations"
      - icon: eye
        title: "Preview & Validate"
        text: >
          See exactly what ships before it goes live. Auto-approve when
          all criteria pass — schema validation, security checks, quality
          gates. Full confidence before production.
        spec: "weblisk preview --validate"
      - icon: cloud-upload
        title: "Deploy & Monitor"
        text: >
          Validated, versioned, deployed — with schema checks and
          automatic rollback. Domain-expert agents continuously monitor
          every layer, ensuring enterprise standards, best practices,
          and protocol compliance.
        spec: "weblisk deploy --auto-rollback"
    loop_label: "Continuous improvement — domain-expert agents monitor every layer, the loop never stops"

  # Why Blueprints
  - id: why-blueprints
    type: content-section
    label: Why Blueprints
    headline: "Your knowledge is your most valuable asset. Protect it."
    description: >
      Frameworks change. Teams turn over. AI evolves. The one thing that
      should never be lost is the knowledge of how your system works and
      why. Blueprints capture that knowledge in structured, versioned
      specifications — not scattered docs, tribal knowledge, or prompt
      history. This is the layer that's been missing.
    attributes:
      data-reveal: true
    cards_attributes:
      data-reveal-stagger: true
    cards:
      - icon: globe
        color: purple
        title: "Centralised Domain Knowledge"
        text: >
          Every decision, pattern, and domain rule lives in one
          specification corpus — not scattered across wikis, tickets,
          and tribal knowledge. The entire system is readable,
          queryable, and permanent.
      - icon: bolt
        color: cyan
        title: "AI That Actually Works"
        text: >
          Stop re-prompting. Define once, generate deterministically —
          every language, zero wasted tokens. Without a spec, AI is
          hallucination with syntax highlighting. With blueprints, it's
          verifiable, reproducible, and cost-efficient.
      - icon: users
        color: green
        title: "Zero Lock-In"
        text: >
          When a developer leaves, the knowledge stays. No months of
          reverse-engineering. No back-and-forth emails reconstructing
          intent. The specification is the handover — any team, any AI,
          any generation of developers can execute from it.
      - icon: layers
        color: orange
        title: "Platform Independence"
        text: >
          One blueprint → Go, Rust, Node, or Cloudflare Workers. Switch
          platforms without losing a single design decision. Your domain
          knowledge transcends any particular language or runtime.
      - icon: book
        color: purple
        title: "Complete System Specification"
        text: >
          Not fragments. Not templates. Protocol, architecture, patterns,
          agents, platforms — 80+ specs that cross-reference and generate
          alongside every other. Years to build. Impossible to shortcut.
      - icon: shield
        color: cyan
        title: "Safe, Versioned Upgrades"
        text: >
          Specs evolve — and so do your data, schemas, and agents. Every
          deployment is diffed, validated, and reversible. Change
          management and migration procedures are built into the
          specification layer, not bolted on.

  # How It Works
  - id: how-it-works
    type: content-section
    label: How It Works
    headline: "Specify → Generate → Deploy"
    description: >
      Define your domain. Generate the full stack. Deploy with
      confidence. When requirements change, update the spec and
      regenerate. Schema migrations, data integrity, and rollback
      strategies are specified alongside your code — nothing is
      left to chance.
    attributes:
      data-reveal: true
    split_pane_demo:
      island: split-demo.js
      hydrate: visible
      left:
        title: domains/chat.yaml
        language: yaml
        content: |
          domain: chat
          version: 1.0.0

          patterns:
            - api-ai
            - auth-token
            - realtime-chat
            - webhooks

          agents:
            - content-quality
            - seo-analyzer

          security:
            identity: ed25519
            access: abac
      divider:
        icon: bolt
        label: Generate
      right:
        tabs:
          - id: go
            label: Go
            language: go
            active: true
            content: |
              package chat

              type ChatService struct {
                auth     TokenAuth
                ws       RealtimeHub
                webhooks WebhookDispatcher
              }

              func (s *ChatService) HandleMessage(
                ctx context.Context,
                msg *Message,
              ) error {
                // Generated from patterns:
                // api-ai, auth-token, realtime-chat
                if err := s.auth.Verify(ctx); err != nil {
                  return err
                }
                s.ws.Broadcast(msg)
                return nil
              }
          - id: node
            label: Node.js
            language: javascript
            content: |
              import { TokenAuth } from './auth.js';
              import { RealtimeHub } from './realtime.js';
              import { WebhookDispatcher } from './webhooks.js';

              // Generated from domains/chat.yaml
              export class ChatService {
                #auth = new TokenAuth();
                #ws   = new RealtimeHub();
                #hooks = new WebhookDispatcher();

                async handleMessage(ctx, msg) {
                  await this.#auth.verify(ctx);
                  this.#ws.broadcast(msg);
                  await this.#hooks.dispatch('message.sent', msg);
                }
              }
          - id: rust
            label: Rust
            language: rust
            content: |
              use crate::{auth::TokenAuth, realtime::Hub};

              // Generated from domains/chat.yaml
              pub struct ChatService {
                  auth: TokenAuth,
                  hub:  Hub,
              }

              impl ChatService {
                  pub async fn handle_message(
                      &self,
                      ctx: &Context,
                      msg: Message,
                  ) -> Result<()> {
                      self.auth.verify(ctx).await?;
                      self.hub.broadcast(&msg).await;
                      Ok(())
                  }
              }

