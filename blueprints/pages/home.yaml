  # Getting Started
  - id: getting-started
    type: getting-started
    background: soft
    label: Getting Started
    headline: "Up and running in minutes."
    description: >
      Install the CLI, initialise a project, generate production
      code, and run it locally.
    attributes:
      data-reveal: true
    steps_attributes:
      data-reveal-stagger: true
    layout: vertical-timeline
    steps:
      - number: 1
        color: purple
        title: Install the CLI
        description: >
          One command. No dependencies. Works on macOS, Linux, and WSL.
        code:
          title: Terminal
          content: |
            $ curl -fsSL https://cdn.weblisk.dev/install.sh | sh
            ✓ Weblisk CLI installed to ~/.weblisk/bin/weblisk
      - number: 2
        color: cyan
        title: Initialise your project
        description: >
          Start from scratch or source a starter template — client,
          server, or full-stack. Use either, or combine both.
        code:
          title: Terminal
          content: |
            $ weblisk init my-app --template server
            ✓ Created my-app/ from weblisk-templates/server
            ✓ Blueprint scaffolding ready
      - number: 3
        color: green
        title: Define and compose
        optional: true
        description: >
          Create domains, compose patterns, and shape blueprints to
          your exact requirements. Skip this if a starter already
          covers what you need.
        code:
          title: Terminal
          content: |
            $ weblisk domain create chat \
                --patterns api-ai,auth-token,realtime-chat
            ✓ Domain "chat" created with 3 patterns
      - number: 4
        color: orange
        title: Generate
        description: >
          Generate production code — client and server components
          built from your blueprints in your target language.
        code:
          title: Terminal
          content: |
            $ weblisk generate --lang go
            ✓ Generated 24 endpoints, 3 agents, 7 patterns
            ✓ Output: ./generated/
      - number: 5
        color: purple
        title: Run and deploy
        description: >
          Start a local dev server to watch your results, then deploy
          to your target platform when you're ready.
        code:
          title: Terminal
          content: |
            $ weblisk dev
            ✓ Dev server running at http://localhost:3000
            ✓ Watching for changes...

            $ weblisk deploy --target cloudflare
            ✓ Deployed to production (validated, versioned)
    cta:
      label: Read the Quick Start Guide
      href: /docs/quickstart.html
      style: primary

