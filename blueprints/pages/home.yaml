  # The MOAT
  - id: moat
    type: content-section
    background: soft
    label: The Platform
    headline: "Over 80 specifications. Years to build. Impossible to shortcut."
    attributes:
      data-reveal: true
    cards_attributes:
      data-reveal-stagger: true
    description: >
      An LLM can't produce a coherent specification corpus. SaaS APIs
      aren't architecture. A federation protocol, security model, and
      agent orchestrator that cross-reference each other don't emerge
      in a weekend. Ideas buried in markdown files drift from reality.
      Structured specifications stay true — and generate. This compounds.
    cards:
      - icon: book
        color: purple
        title: "Complete System Specification"
        text: >
          Not fragments. Not templates. Protocol, architecture, patterns,
          agents, platforms, standards — each spec cross-references and
          generates alongside every other.
      - icon: layers
        color: cyan
        title: "Language & Platform Independence"
        text: >
          One blueprint → Go, Rust, Node, or Cloudflare Workers.
          Switch platforms without losing a single design decision.
      - icon: bolt
        color: green
        title: "AI That Actually Works"
        text: >
          Stop re-prompting. Define once, generate deterministically —
          every language, zero wasted tokens. Without a spec, AI is
          hallucination with syntax highlighting. With blueprints, it's
          verifiable and reproducible.
      - icon: shield
        color: orange
        title: "Safe, Versioned Upgrades"
        text: >
          Specs evolve — and so do your data, schemas, and agents.
          Every deployment is diffed, validated, and reversible.
          Change management, migration procedures, and deprecation
          lifecycles are built into the specification layer, not
          bolted on after the fact.

  # How It Works
  - id: how-it-works
    type: content-section
    label: How It Works
    headline: "Specify → Generate → Deploy"
    description: >
      Define your domain. Generate the full stack. Deploy with
      confidence. When requirements change, update the spec and
      regenerate. Schema migrations, data integrity, and rollback
      strategies are specified alongside your code — nothing is
      left to chance.
    attributes:
      data-reveal: true
    split_pane_demo:
      island: split-demo.js
      hydrate: visible
      left:
        title: domains/chat.yaml
        language: yaml
        content: |
          domain: chat
          version: 1.0.0

          patterns:
            - api-ai
            - auth-token
            - realtime-chat
            - webhooks

          agents:
            - content-quality
            - seo-analyzer

          security:
            identity: ed25519
            access: abac
      divider:
        icon: bolt
        label: Generate
      right:
        tabs:
          - id: go
            label: Go
            language: go
            active: true
            content: |
              package chat

              type ChatService struct {
                auth     TokenAuth
                ws       RealtimeHub
                webhooks WebhookDispatcher
              }

              func (s *ChatService) HandleMessage(
                ctx context.Context,
                msg *Message,
              ) error {
                // Generated from patterns:
                // api-ai, auth-token, realtime-chat
                if err := s.auth.Verify(ctx); err != nil {
                  return err
                }
                s.ws.Broadcast(msg)
                return nil
              }
          - id: node
            label: Node.js
            language: javascript
            content: |
              import { TokenAuth } from './auth.js';
              import { RealtimeHub } from './realtime.js';
              import { WebhookDispatcher } from './webhooks.js';

              // Generated from domains/chat.yaml
              export class ChatService {
                #auth = new TokenAuth();
                #ws   = new RealtimeHub();
                #hooks = new WebhookDispatcher();

                async handleMessage(ctx, msg) {
                  await this.#auth.verify(ctx);
                  this.#ws.broadcast(msg);
                  await this.#hooks.dispatch('message.sent', msg);
                }
              }
          - id: rust
            label: Rust
            language: rust
            content: |
              use crate::{auth::TokenAuth, realtime::Hub};

              // Generated from domains/chat.yaml
              pub struct ChatService {
                  auth: TokenAuth,
                  hub:  Hub,
              }

              impl ChatService {
                  pub async fn handle_message(
                      &self,
                      ctx: &Context,
                      msg: Message,
                  ) -> Result<()> {
                      self.auth.verify(ctx).await?;
                      self.hub.broadcast(&msg).await;
                      Ok(())
                  }
              }

