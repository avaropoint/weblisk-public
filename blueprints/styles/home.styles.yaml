# Homepage — Page-Specific Styles
# CSS additions beyond the base theme that are specific to the homepage.
# The generated styles in /css/styles.css MUST match this specification.
# Base design tokens live in /.weblisk/theme.yaml.

name: home-styles
type: styles
page: home
status: active
version: 2.0.0

# References the shared theme tokens
theme: ../../.weblisk/theme.yaml

# ─── Hero Trust Signals ─────────────────────────────────
# Row of icon+text badges below the install command.
# Pattern: avaropoint.com hero trust signals.
hero_trust:
  layout: flex-row-center
  gap: 1.5rem
  wrap: true
  margin_top: 0.5rem
  item:
    display: inline-flex
    align_items: center
    gap: 0.4rem
    font_size: 0.85rem
    font_weight: 500
    color: var(--wl-text-muted)
    icon_color: var(--wl-primary)
    icon_size: 16

# ─── Install Command ────────────────────────────────────
# Spacing adjustment: margin-bottom added to separate from trust row.
install_cmd:
  margin_bottom: 1.5rem

# ─── Hero Tagline (legacy — kept for reference) ────────
# Previously used for "Describe once. Generate forever. Own everything."
# as styled text. Now replaced by hero_trust signals.
# Retained in CSS for backward compatibility with other pages.
hero_tagline:
  font_size: "clamp(1.1rem, 2.5vw, 1.4rem)"
  font_weight: 600
  letter_spacing: "-0.01em"
  layout: flex-row-center
  gap: 0.75rem
  accent_phrases: [ 1, 3 ]
  hover_opacity: [ 0.85, 1.0 ]

# ─── Feature Card Icons ────────────────────────────────
# "Why This Matters" section uses inline SVGs instead of wl-icon
# font classes. All other sections use wl-icon-* classes.
why_this_matters_icons:
  type: inline-svg
  stroke_width: 2
  size: 24
  icons:
    centralised_intelligence:
      description: Globe with meridians
      paths:
        - circle: { cx: 12, cy: 12, r: 10 }
        - path: "M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10 15 15 0 0 1
            4-10z"
        - path: "M2 12h20"
    zero_developer_lock_in:
      description: Users group
      paths:
        - path: "M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"
        - circle: { cx: 9, cy: 7, r: 4 }
        - path: "M23 21v-2a4 4 0 0 0-3-3.87"
        - path: "M16 3.13a4 4 0 0 1 0 7.75"
    anyone_can_build:
      description: Stacked layers
      paths:
        - path: "M12 2L2 7l10 5 10-5-10-5z"
        - path: "M2 17l10 5 10-5"
        - path: "M2 12l10 5 10-5"
    protect_what_matters:
      description: Shield
      paths:
        - path: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"

# ─── Hero Trust Signal Icons ───────────────────────────
hero_trust_icons:
  type: inline-svg
  stroke_width: 2
  size: 16
  icons:
    describe_once:
      description: Document with lines
      paths:
        - path: "M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
        - polyline: "14 2 14 8 20 8"
        - line: { x1: 16, y1: 13, x2: 8, y2: 13 }
        - line: { x1: 16, y1: 17, x2: 8, y2: 17 }
    generate_forever:
      description: Shuffle/branch arrows
      paths:
        - polyline: "16 3 21 3 21 8"
        - line: { x1: 4, y1: 20, x2: 21, y2: 3 }
        - polyline: "21 16 21 21 16 21"
        - line: { x1: 15, y1: 15, x2: 21, y2: 21 }
        - line: { x1: 4, y1: 4, x2: 9, y2: 9 }
    own_everything:
      description: Shield
      paths:
        - path: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"
