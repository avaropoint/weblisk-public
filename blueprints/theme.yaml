  primary_hover: "#2D3E64"
  primary_light: "rgba(59, 79, 124, 0.08)"
  primary_glow: "rgba(59, 79, 124, 0.2)"
  accent: "#0b7d97"       # Teal — secondary accent
  accent_light: "rgba(11, 125, 151, 0.08)"
  success: "#047857"       # Green — positive states
  warning: "#b45309"       # Amber — caution states
  danger: "#dc2626"        # Red — error states
  purple: "#7c3aed"        # Purple — accent
  cyan: "#0891b2"          # Cyan — accent
  green: "#059669"         # Green — accent
  orange: "#d97706"        # Orange — accent
  surface: "#ffffff"       # Light mode background
  surface_alt: "#f8fafc"   # Light mode alternate bg
  surface_dark: "#0b1121"  # Dark mode background
  surface_dark_alt: "#131b2e"
  text: "#0f172a"          # Light mode text
  text_muted: "#64748b"    # Light mode secondary text
  text_dim: "#627384"      # Light mode dim text
  text_dark: "#e2e8f0"     # Dark mode text
  text_dark_muted: "#8b9cb7"
  border: "#e2e8f0"
  border_dark: "#1e2d4a"

typography:
  font_family: "Inter, system-ui, -apple-system, sans-serif"
  font_mono: "'JetBrains Mono', ui-monospace, monospace"
  base_size: 16px
  scale: 1.25
  line_height: 1.6
  heading_weight: 700
  body_weight: 400

spacing:
  unit: 8px
  xs: 4px
  sm: 8px
  md: 16px
  lg: 24px
  xl: 32px
  xxl: 48px
  section: 80px

breakpoints:
  mobile: 640px
  tablet: 768px
  desktop: 1024px
  wide: 1280px

border_radius:
  sm: 4px
  md: 8px
  lg: 12px
  xl: 16px
  full: 9999px

shadows:
  sm: "0 1px 2px rgba(0,0,0,0.05)"
  md: "0 4px 6px rgba(0,0,0,0.07)"
  lg: "0 10px 15px rgba(0,0,0,0.1)"

transitions:
  fast: "150ms ease"
  normal: "250ms ease"
  slow: "350ms ease"

syntax_highlighting:
  keyword: "#c084fc"
  string: "#34d399"
  number: "#fb923c"
  comment: "#7c8ca2"
  function: "#60a5fa"
  tag: "#f472b6"
  attr: "#fbbf24"
  punctuation: "#94a3b8"

modes:
  dark: true
  light: true
  default: light
  dark_overrides:
