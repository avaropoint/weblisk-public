# Weblisk — Theme Configuration
# Consumed by code generation to produce CSS custom properties.

colors:
  primary: "#6366f1"       # Indigo — brand accent
  primary_light: "#818cf8"
  primary_dark: "#4f46e5"
  secondary: "#06b6d4"     # Cyan — secondary accent
  success: "#10b981"       # Green — positive states
  warning: "#f59e0b"       # Amber — caution states
  danger: "#ef4444"        # Red — error states
  surface: "#ffffff"       # Light mode background
  surface_alt: "#f8fafc"   # Light mode alternate bg
  surface_dark: "#1a1f36"  # Dark mode background
  surface_dark_alt: "#232946"
  text: "#1e293b"          # Light mode text
  text_muted: "#64748b"    # Light mode secondary text
  text_dark: "#e2e8f0"     # Dark mode text
  text_dark_muted: "#94a3b8"
  border: "#e2e8f0"
  border_dark: "#334155"

typography:
  font_family: "Inter, system-ui, -apple-system, sans-serif"
  font_mono: "JetBrains Mono, ui-monospace, monospace"
  base_size: 16px
  scale: 1.25
  line_height: 1.6
  heading_weight: 700
  body_weight: 400

spacing:
  unit: 8px
  xs: 4px
  sm: 8px
  md: 16px
  lg: 24px
  xl: 32px
  xxl: 48px
  section: 80px

breakpoints:
  mobile: 640px
  tablet: 768px
  desktop: 1024px
  wide: 1280px

border_radius:
  sm: 4px
  md: 8px
  lg: 12px
  xl: 16px
  full: 9999px

shadows:
  sm: "0 1px 2px rgba(0,0,0,0.05)"
  md: "0 4px 6px rgba(0,0,0,0.07)"
  lg: "0 10px 15px rgba(0,0,0,0.1)"

transitions:
  fast: "150ms ease"
  normal: "250ms ease"
  slow: "350ms ease"

modes:
  dark: true
  light: true
  default: light
