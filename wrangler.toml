# Weblisk Public Website — Cloudflare Worker + R2
# Static site with Blueprint API for live specification viewing.

name = "weblisk-public"
main = "workers/site.js"
compatibility_date = "2026-04-01"

routes = [
  { pattern = "weblisk.dev/*", zone_name = "weblisk.dev" },
  { pattern = "weblisk.dev", zone_name = "weblisk.dev" }
]

[[r2_buckets]]
binding = "SITE"
bucket_name = "weblisk-public"
preview_bucket_name = "weblisk-public-preview"
