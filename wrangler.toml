# Weblisk Public Website — Cloudflare Worker + R2 + KV
# Gateway serves weblisk.dev from R2, with KV edge caching
# and agent routing. See: architecture/gateway.md

name = "weblisk-public"
main = "workers/site.js"
compatibility_date = "2026-04-01"

routes = [
  { pattern = "weblisk.dev/*", zone_name = "weblisk.dev" },
  { pattern = "weblisk.dev", zone_name = "weblisk.dev" }
]

# ── R2: file storage (static assets + blueprints) ──
[[r2_buckets]]
binding = "SITE"
bucket_name = "weblisk-public"
preview_bucket_name = "weblisk-public-preview"

# ── KV: edge cache (service directory, hot responses) ──
[[kv_namespaces]]
binding = "CACHE"
id = "7606e97b0b2b46369fc120a9667b7ecc"
preview_id = "e0440485b33e41be9e062c12b6ab1639"

[vars]
WL_VERSION = "1.0.0"
WL_AI_MODEL = "claude-sonnet-4-20250514"
WL_AI_BASE_URL = "https://gateway.ai.cloudflare.com/v1/2cabe7bc419e2b0fa22cc2b37ff60425/weblisk-ai/anthropic"
WL_ENVIRONMENT = "production"

# WL_AI_KEY is a secret — set via: npx wrangler secret put WL_AI_KEY
# Until set, the examples agent returns placeholder responses.

# ── Preview environment (uses preview R2 + KV automatically) ──
[env.preview]
name = "weblisk-public-preview"
routes = []

[env.preview.vars]
WL_VERSION = "1.0.0"
WL_AI_MODEL = "claude-sonnet-4-20250514"
WL_AI_BASE_URL = "https://gateway.ai.cloudflare.com/v1/2cabe7bc419e2b0fa22cc2b37ff60425/weblisk-ai/anthropic"
WL_ENVIRONMENT = "preview"
